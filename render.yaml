databases:
  - name: velvet-hive-db
    plan: free
    databaseName: velvet_hive
    user: velvet_hive

services:
  - type: web
    name: velvet-hive-backend
    runtime: docker
    dockerfilePath: ./server/Dockerfile
    dockerContext: ./server
    plan: free
    healthCheckPath: /api/health
    # Note: preDeployCommand does not appear to run on Render's free plan
    # (confirmed - deploy logs show no trace of it executing). Seeding is
    # done as a one-off from a local machine instead - see server/API.md.
    preDeployCommand: npx prisma migrate deploy
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: velvet-hive-db
          property: connectionString
      - key: PORT
        value: 3001
      - key: FRONTEND_URL
        value: https://velvet-hive-frontend.onrender.com
      - key: CORS_ORIGIN
        value: https://velvet-hive-frontend.onrender.com
      - key: APP_NAME
        value: Velvet Hive
      - key: JWT_ACCESS_SECRET
        generateValue: true
      - key: JWT_REFRESH_PEPPER
        generateValue: true
      - key: SUPER_ADMIN_EMAIL
        sync: false
      - key: SUPER_ADMIN_PASSWORD
        sync: false
      - key: DARAJA_ENV
        value: sandbox
      - key: DARAJA_CONSUMER_KEY
        sync: false
      - key: DARAJA_CONSUMER_SECRET
        sync: false
      - key: DARAJA_SHORTCODE
        sync: false
      - key: DARAJA_PASSKEY
        sync: false
      - key: DARAJA_CALLBACK_BASE_URL
        value: https://velvet-hive-backend.onrender.com
      - key: PAYSTACK_PUBLIC_KEY
        sync: false
      - key: PAYSTACK_SECRET_KEY
        sync: false
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        sync: false
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: SMTP_FROM
        sync: false
      - key: SMTP_SECURE
        value: 'true'
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: GOOGLE_REDIRECT_URI
        value: https://velvet-hive-backend.onrender.com/api/auth/google/callback
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      - key: SENTRY_DSN
        sync: false

  - type: web
    name: velvet-hive-frontend
    runtime: static
    buildCommand: npm ci && npm run build
    staticPublishPath: ./dist
    envVars:
      - key: VITE_SENTRY_DSN
        sync: false
    routes:
      # Same-origin API, proxied to the backend service so cookies and the
      # app's existing relative "/api" paths keep working unchanged. Uploaded
      # media (avatars) is served directly from Cloudinary's CDN.
      - type: rewrite
        source: /api/*
        destination: https://velvet-hive-backend.onrender.com/api/*
      - type: rewrite
        source: /*
        destination: /index.html
