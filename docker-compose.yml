services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ecommerce_db
    ports:
      - '5432:5432'
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 5s
      timeout: 5s
      retries: 10

  mailpit:
    image: axllent/mailpit
    restart: unless-stopped
    ports:
      - '1025:1025' # SMTP
      - '8025:8025' # Web UI

  backend:
    build:
      context: ./server
    restart: unless-stopped
    env_file:
      - ./server/.env
    environment:
      # Override host-only values from server/.env so the container talks to
      # the other compose services by name instead of localhost.
      DATABASE_URL: postgresql://postgres:postgres@db:5432/ecommerce_db?schema=public
      SMTP_HOST: mailpit
      SMTP_PORT: 1025
      FRONTEND_URL: http://localhost:5173
      CORS_ORIGIN: http://localhost:5173
    ports:
      - '3001:3001'
    depends_on:
      db:
        condition: service_healthy
      mailpit:
        condition: service_started

  frontend:
    build:
      context: .
    restart: unless-stopped
    environment:
      BACKEND_HOST: backend
      BACKEND_PORT: 3001
    ports:
      - '5173:80'
    depends_on:
      - backend

volumes:
  db_data:
